name: Build and Push Docker Images

on:
  push:
    branches:
      - digitalocean

env:
  REGISTRY: registry.digitalocean.com/dockerimages
  IMAGE_NAME_WEB: calcom-web
  IMAGE_NAME_API: calcom-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to DigitalOcean Container Registry
        uses: docker/login-action@v2
        with:
          registry: registry.digitalocean.com
          username: doctl
          password: ${{ secrets.DO_REGISTRY_TOKEN }}

      - name: Debug Docker Info
        run: |
          docker info
          cat ~/.docker/config.json || true

      - name: Build and push Web image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_WEBAPP_URL_PLACEHOLDER=http://137.184.36.83:3000
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_WEB }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_WEB }}:${{ github.sha }}

      - name: Build and push API image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./apps/api/v2/Dockerfile
          push: true
          build-args: |
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            DATABASE_DIRECT_URL=${{ secrets.DATABASE_DIRECT_URL }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_API }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_API }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy to DigitalOcean Droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USERNAME }}
          password: ${{ secrets.DROPLET_PASSWORD }}
          script: |
            echo ${{ secrets.DO_REGISTRY_TOKEN }} | docker login registry.digitalocean.com -u doctl --password-stdin
            
            docker pull registry.digitalocean.com/dockerimages/calcom-api:latest
            docker pull registry.digitalocean.com/dockerimages/calcom-web:latest
            
            docker stop calcom-api calcom-web || true
            docker rm calcom-api calcom-web || true
            
            docker run -d \
              --name calcom-api \
              -p 3001:80 \
              --restart always \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e DATABASE_DIRECT_URL="${{ secrets.DATABASE_DIRECT_URL }}" \
              registry.digitalocean.com/dockerimages/calcom-api:latest
              
            docker run -d \
              --name calcom-web \
              -p 3000:3000 \
              --restart always \
              -e NEXT_PUBLIC_API_V2_URL="http://127.0.0.1:3001" \
              -e NEXTAUTH_URL="http://${{ secrets.DROPLET_HOST }}:3000/api/auth" \
              -e NEXTAUTH_SECRET="${{ secrets.NEXTAUTH_SECRET }}" \
              -e NEXT_PUBLIC_WEBAPP_URL="http://${{ secrets.DROPLET_HOST }}:3000" \
              registry.digitalocean.com/dockerimages/calcom-web:latest

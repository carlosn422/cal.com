name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DigitalOcean Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DO_REGISTRY_URL }}
          username: ${{ secrets.DO_REGISTRY_TOKEN }}
          password: ${{ secrets.DO_REGISTRY_TOKEN }}

      - name: Build and push Docker images
        run: |
          # Export variables for image tags to the shell environment
          export DO_REGISTRY_URL=${{ secrets.DO_REGISTRY_URL }}
          export DO_REGISTRY_NAME=${{ secrets.DO_REGISTRY_NAME }}
          export GH_REGISTRY_URL=ghcr.io
          export GH_REPOSITORY=${{ github.repository }}
          export DOCKER_IMAGE_TAG=${{ github.sha }}

          # Create a complete .env file for build-time arguments
          cat << EOF > .env
          # From GitHub Secrets
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          DATABASE_DIRECT_URL=${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
          CALENDSO_ENCRYPTION_KEY=${{ secrets.CALENDSO_ENCRYPTION_KEY }}
          API_KEY_PREFIX=${{ secrets.API_KEY_PREFIX }}
          CALCOM_LICENSE_KEY=${{ secrets.CALCOM_LICENSE_KEY }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          NEXT_PUBLIC_VAPID_PUBLIC_KEY=${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY=${{ secrets.VAPID_PRIVATE_KEY }}
          STRIPE_API_KEY=${{ secrets.STRIPE_API_KEY }}
          STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_ID_STARTER=${{ secrets.STRIPE_PRICE_ID_STARTER }}
          STRIPE_PRICE_ID_STARTER_OVERAGE=${{ secrets.STRIPE_PRICE_ID_STARTER_OVERAGE }}
          STRIPE_PRICE_ID_ESSENTIALS=${{ secrets.STRIPE_PRICE_ID_ESSENTIALS }}
          STRIPE_PRICE_ID_ESSENTIALS_OVERAGE=${{ secrets.STRIPE_PRICE_ID_ESSENTIALS_OVERAGE }}
          STRIPE_PRICE_ID_ENTERPRISE=${{ secrets.STRIPE_PRICE_ID_ENTERPRISE }}
          STRIPE_PRICE_ID_ENTERPRISE_OVERAGE=${{ secrets.STRIPE_PRICE_ID_ENTERPRISE_OVERAGE }}
          STRIPE_TEAM_MONTHLY_PRICE_ID=${{ secrets.STRIPE_TEAM_MONTHLY_PRICE_ID }}
          AXIOM_DATASET=${{ secrets.AXIOM_DATASET }}
          AXIOM_TOKEN=${{ secrets.AXIOM_TOKEN }}
          GET_LICENSE_KEY_URL=${{ secrets.GET_LICENSE_KEY_URL }}

          # With Defaults
          NEXT_PUBLIC_WEBAPP_URL=${{ secrets.NEXT_PUBLIC_WEBAPP_URL || 'http://localhost:3000' }}
          NEXT_PUBLIC_API_V2_URL=${{ secrets.NEXT_PUBLIC_API_V2_URL || 'http://localhost/api/v2' }}
          NEXT_PUBLIC_LICENSE_CONSENT=${{ secrets.NEXT_PUBLIC_LICENSE_CONSENT || 'false' }}
          NEXT_PUBLIC_WEBSITE_TERMS_URL=${{ secrets.NEXT_PUBLIC_WEBSITE_TERMS_URL || 'https://cal.com/terms' }}
          NEXT_PUBLIC_WEBSITE_PRIVACY_POLICY_URL=${{ secrets.NEXT_PUBLIC_WEBSITE_PRIVACY_POLICY_URL || 'https://cal.com/privacy' }}
          NEXT_PUBLIC_SINGLE_ORG_SLUG=${{ secrets.NEXT_PUBLIC_SINGLE_ORG_SLUG || '' }}
          ORGANIZATIONS_ENABLED=${{ secrets.ORGANIZATIONS_ENABLED || 'false' }}
          NODE_ENV=${{ secrets.NODE_ENV || 'production' }}
          API_URL=${{ secrets.API_URL || 'http://localhost/api' }}
          LOG_LEVEL=${{ secrets.LOG_LEVEL || 'info' }}
          WEB_APP_URL=${{ secrets.WEB_APP_URL || 'http://localhost:3000' }}
          LOGGER_BRIDGE_LOG_LEVEL=${{ secrets.LOGGER_BRIDGE_LOG_LEVEL || 'info' }}
          DOCS_URL=${{ secrets.DOCS_URL || 'https://cal.com/docs' }}
          REDIS_URL=${{ secrets.REDIS_URL || 'redis://redis:6379' }}
          EOF

          docker build -t ${DO_REGISTRY_URL}/${DO_REGISTRY_NAME}/calcom-api:${DOCKER_IMAGE_TAG:-latest} -f apps/api/v2/Dockerfile .
          docker compose -f docker-compose.yml push

      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USERNAME }}
          password: ${{ secrets.DROPLET_PASSWORD }}
          script: |
            mkdir -p /opt/cal.com
            cd /opt/cal.com

            export DO_REGISTRY_URL=${{ secrets.DO_REGISTRY_URL }}
            export DO_REGISTRY_NAME=${{ secrets.DO_REGISTRY_NAME }}
            export DOCKER_IMAGE_TAG=${{ github.sha }}
            export DATABASE_URL=${{ secrets.DATABASE_URL }}
            export NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
            export CALENDSO_ENCRYPTION_KEY=${{ secrets.CALENDSO_ENCRYPTION_KEY }}
            export NEXT_PUBLIC_WEBAPP_URL=${{ secrets.NEXT_PUBLIC_WEBAPP_URL }}
            export API_KEY_PREFIX=${{ secrets.API_KEY_PREFIX }}
            export CALCOM_LICENSE_KEY=${{ secrets.CALCOM_LICENSE_KEY }}

            cat << EOF > docker-compose.prod.yml
            version: '3.8'
            services:
              calcom:
                image: ${DO_REGISTRY_URL}/${DO_REGISTRY_NAME}/calcom:${DOCKER_IMAGE_TAG:-latest}
                ports:
                  - "3000:3000"
                environment:
                  - DATABASE_URL=${DATABASE_URL}
                  - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
                  - CALENDSO_ENCRYPTION_KEY=${CALENDSO_ENCRYPTION_KEY}
                  - NEXT_PUBLIC_WEBAPP_URL=${NEXT_PUBLIC_WEBAPP_URL}
                  - WEBPACK_WATCHING=false
                depends_on:
                  - redis
              calcom-api:
                image: ${DO_REGISTRY_URL}/${DO_REGISTRY_NAME}/calcom-api:${DOCKER_IMAGE_TAG:-latest}
                ports:
                  - "80:80"
                environment:
                  - DATABASE_URL=${DATABASE_URL}
                  - API_KEY_PREFIX=${API_KEY_PREFIX}
                  - CALENDSO_ENCRYPTION_KEY=${CALENDSO_ENCRYPTION_KEY}
                  - CALCOM_LICENSE_KEY=${CALCOM_LICENSE_KEY}
                depends_on:
                  - redis
              redis:
                image: redis:6.2-alpine
                ports:
                  - "6379:6379"
            EOF

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --force-recreate
